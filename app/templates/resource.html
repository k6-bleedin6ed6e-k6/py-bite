{% extends "base.html" %}

{% block title %}{{ resource.title }} | Python Tutor{% endblock %}

{% block content %}
<div class="chapter-hero">
    <span class="chapter-number-large">Further Reading</span>
    <h1>{{ resource.title }}</h1>
    <p class="chapter-description">{{ resource.description }}</p>
</div>

<div class="resource-viewer">
    <iframe src="{{ resource.pdf }}" title="{{ resource.title }}" loading="lazy"></iframe>
</div>

<div class="chapter-actions">
    <a href="{{ resource.pdf }}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">Open in New Tab</a>
    <a href="javascript:history.back()" class="btn btn-ghost">Back</a>
</div>
{% endblock %}
